<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ كأس العالم</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); margin: 0; padding: 0; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; }
        .login-card h2 { color: #1e3c72; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; margin-top: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .login-card button:hover { background: #2563eb; }
        #mainApp { display: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin: 0; }
        .user-info { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .nav { padding: 12px 20px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 500; transition: all 0.3s; }
        .nav:hover { background: rgba(255,255,255,0.3); }
        .nav.active { background: #fbbf24; color: #1e3c72; font-weight: bold; }
        .view { display: none; }
        .view.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card.highlight { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: white; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #1e3c72; }
        .stat-card.highlight .stat-value { color: white; }
        .stat-label { font-size: 0.9em; color: #666; margin-bottom: 10px; }
        .stat-card.highlight .stat-label { color: rgba(255,255,255,0.9); }
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .section h3 { margin-bottom: 20px; color: #1e3c72; }
        .match-card { background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .match-line { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; margin-bottom: 12px; text-align: center; }
        .team { font-weight: bold; word-break: break-word; }
        .score { font-size: 1.3em; font-weight: bold; color: #1e3c72; }
        .prediction-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .prediction-inputs input { padding: 10px; border: 2px solid #e5e7eb; border-radius: 6px; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .control-input { padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1em; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f3f4f6; padding: 12px; text-align: right; font-weight: 600; color: #1e3c72; border-bottom: 2px solid #e5e7eb; }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        .btn-small { padding: 6px 12px; font-size: 0.9em; margin: 5px; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h2>👋 مرحباً!</h2>
        <p>أدخل اسمك للدخول</p>
        <input type="text" id="userName" placeholder="اسمك" />
        <button onclick="doLogin()">دخول 🎉</button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp">
    <div class="container">
        <header>
            <h1>⚽ كأس العالم 2026</h1>
            <p>توقعات ونتائج المباريات</p>
        </header>

        <div class="user-info">
            <span id="greeting">مرحباً</span>
            <button onclick="doLogout()" class="btn btn-danger">خروج</button>
        </div>

        <nav class="navbar">
            <button class="nav active" onclick="switchTab('dash', this)">📊 لوحة التحكم</button>
            <button class="nav" onclick="switchTab('pred', this)">🎯 التوقعات</button>
            <button class="nav" onclick="switchTab('board', this)">🏆 الترتيب</button>
            <button class="nav" onclick="switchTab('admin', this)">⚙️ إدارة</button>
        </nav>

        <!-- Dashboard -->
        <div id="dash" class="view active">
            <h2>📊 لوحة التحكم</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">المشاركون</div><div class="stat-value" id="sp">0</div></div>
                <div class="stat-card"><div class="stat-label">المباريات</div><div class="stat-value" id="sm">0</div></div>
                <div class="stat-card"><div class="stat-label">التوقعات</div><div class="stat-value" id="st">0</div></div>
                <div class="stat-card highlight"><div class="stat-label">أعلى نقاط</div><div class="stat-value" id="sx">0</div></div>
            </div>
            <div class="section">
                <h3>🏆 أفضل 5 لاعبين</h3>
                <div id="top5"></div>
            </div>
        </div>

        <!-- Predictions -->
        <div id="pred" class="view">
            <h2>🎯 التوقعات</h2>
            <div id="matches"></div>
        </div>

        <!-- Leaderboard -->
        <div id="board" class="view">
            <h2>🏆 جدول الترتيب</h2>
            <div id="board-table"></div>
        </div>

        <!-- Admin -->
        <div id="admin" class="view">
            <h2>⚙️ الإدارة</h2>
            <div class="section">
                <h3>➕ إضافة مشارك</h3>
                <input type="text" id="newName" placeholder="اسم المشارك" class="control-input" />
                <button onclick="addPlayer()" class="btn btn-primary">إضافة</button>
            </div>
            <div class="section">
                <h3>➕ إضافة مباراة</h3>
                <input type="text" id="team1" placeholder="الفريق الأول" class="control-input" />
                <input type="text" id="team2" placeholder="الفريق الثاني" class="control-input" />
                <input type="datetime-local" id="matchTime" class="control-input" />
                <button onclick="addMatch()" class="btn btn-primary">إضافة</button>
            </div>
            <div class="section" id="admin-players"></div>
            <div class="section" id="admin-matches"></div>
        </div>
    </div>
</div>

<script>
const DB_KEY = 'wc_db_2026_v2';
const USER_KEY = 'wc_user_2026_v2';
const ADMIN_PASS = '12345';

let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
    players: [{id: 'p1', name: 'أبوعلي'}],
    matches: [],
    predictions: {}
};

let user = JSON.parse(localStorage.getItem(USER_KEY));
let isAdmin = false;

function saveDB() {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
}

function doLogin() {
    let name = document.getElementById('userName').value.trim();
    if(!name) { alert('اكتب اسمك!'); return; }
    
    let p = db.players.find(x => x.name === name);
    if(!p) {
        p = {id: 'p'+Date.now(), name: name};
        db.players.push(p);
        saveDB();
    }
    
    user = {id: p.id, name: p.name};
    localStorage.setItem(USER_KEY, JSON.stringify(user));
    
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('greeting').textContent = '👋 '+user.name;
    render();
}

function doLogout() {
    user = null;
    localStorage.removeItem(USER_KEY);
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('userName').value = '';
}

function switchTab(tab, btn) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    document.querySelectorAll('.nav').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    
    if(tab === 'admin') {
        let pass = prompt('كلمة مرور الإدارة:');
        if(pass !== ADMIN_PASS) {
            alert('كلمة المرور خاطئة!');
            switchTab('dash', document.querySelector('.nav'));
            return;
        }
        isAdmin = true;
    }
    render();
}

function addPlayer() {
    if(!isAdmin) return;
    let n = document.getElementById('newName').value.trim();
    if(!n) { alert('اكتب اسم المشارك!'); return; }
    if(db.players.find(x => x.name === n)) { alert('الاسم موجود!'); return; }
    db.players.push({id: 'p'+Date.now(), name: n});
    document.getElementById('newName').value = '';
    saveDB();
    render();
}

function delPlayer(id) {
    if(!isAdmin) return;
    if(confirm('حذف المشارك؟')) {
        db.players = db.players.filter(p => p.id !== id);
        delete db.predictions[id];
        saveDB();
        render();
    }
}

function addMatch() {
    if(!isAdmin) return;
    let t1 = document.getElementById('team1').value.trim();
    let t2 = document.getElementById('team2').value.trim();
    let tm = document.getElementById('matchTime').value;
    if(!t1 || !t2 || !tm) { alert('أكمل البيانات!'); return; }
    db.matches.push({id: 'm'+Date.now(), home: t1, away: t2, kickoff: tm, homeScore: null, awayScore: null});
    document.getElementById('team1').value = '';
    document.getElementById('team2').value = '';
    document.getElementById('matchTime').value = '';
    saveDB();
    render();
}

function delMatch(id) {
    if(!isAdmin) return;
    if(confirm('حذف المباراة؟')) {
        db.matches = db.matches.filter(m => m.id !== id);
        Object.values(db.predictions).forEach(p => delete p[id]);
        saveDB();
        render();
    }
}

function setResult(id, h, a) {
    if(!isAdmin) return;
    let m = db.matches.find(x => x.id === id);
    if(m) {
        m.homeScore = h === '' ? null : +h;
        m.awayScore = a === '' ? null : +a;
        saveDB();
        render();
    }
}

function setPred(mid, side, val) {
    let m = db.matches.find(x => x.id === mid);
    if(new Date() >= new Date(m.kickoff)) { alert('المباراة مغلقة!'); return; }
    db.predictions[user.id] = db.predictions[user.id] || {};
    db.predictions[user.id][mid] = db.predictions[user.id][mid] || {home: '', away: ''};
    db.predictions[user.id][mid][side] = val;
    saveDB();
    render();
}

function getScore(m, p) {
    if(!p || p.home === '' || p.away === '' || m.homeScore === null || m.awayScore === null) return 0;
    if(+p.home === +m.homeScore && +p.away === +m.awayScore) return 5;
    let res1 = (+m.homeScore > +m.awayScore) ? 'H' : (+m.homeScore < +m.awayScore) ? 'A' : 'D';
    let res2 = (+p.home > +p.away) ? 'H' : (+p.home < +p.away) ? 'A' : 'D';
    return res1 === res2 ? 2 : 0;
}

function getStandings() {
    return db.players.map(p => {
        let pts = db.matches.reduce((s, m) => {
            let pr = (db.predictions[p.id] || {})[m.id];
            return s + getScore(m, pr);
        }, 0);
        return {name: p.name, id: p.id, pts: pts, cnt: Object.keys(db.predictions[p.id] || {}).length};
    }).sort((a, b) => b.pts - a.pts);
}

function render() {
    if(!user) return;
    
    document.getElementById('sp').textContent = db.players.length;
    document.getElementById('sm').textContent = db.matches.length;
    document.getElementById('st').textContent = Object.values(db.predictions).reduce((s, p) => s + Object.keys(p).length, 0);
    document.getElementById('sx').textContent = getStandings()[0]?.pts || 0;
    
    let st = getStandings().slice(0, 5);
    document.getElementById('top5').innerHTML = '<table><tr><th>#</th><th>المشارك</th><th>النقاط</th></tr>' + 
        st.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.pts}</td></tr>`).join('') + 
        '</table>';
    
    let matches = db.matches.map(m => {
        let pr = (db.predictions[user.id] || {})[m.id] || {home: '', away: ''};
        let locked = new Date() >= new Date(m.kickoff);
        return `<div class="match-card">
            <div class="match-line">
                <div class="team">${m.home}</div>
                <div class="score">${m.homeScore ?? '-'} : ${m.awayScore ?? '-'}</div>
                <div class="team">${m.away}</div>
            </div>
            <div class="prediction-inputs">
                <input type="number" ${locked ? 'disabled' : ''} value="${pr.home}" onchange="setPred('${m.id}', 'home', this.value)" placeholder="أهداف">
                <input type="number" ${locked ? 'disabled' : ''} value="${pr.away}" onchange="setPred('${m.id}', 'away', this.value)" placeholder="أهداف">
            </div>
            <p>نقاطك: <b>${getScore(m, pr)}</b> ${locked ? '🔒' : '✅'}</p>
        </div>`;
    }).join('');
    document.getElementById('matches').innerHTML = matches || '<p>لا توجد مباريات</p>';
    
    let board = getStandings();
    document.getElementById('board-table').innerHTML = '<table><tr><th>#</th><th>المشارك</th><th>النقاط</th><th>التوقعات</th></tr>' +
        board.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.pts}</td><td>${p.cnt}</td></tr>`).join('') +
        '</table>';
    
    if(isAdmin) {
        document.getElementById('admin-players').innerHTML = '<h3>👥 المشاركون</h3><table><tr><th>#</th><th>الاسم</th><th></th></tr>' +
            db.players.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td><button class="btn btn-danger btn-small" onclick="delPlayer('${p.id}')">حذف</button></td></tr>`).join('') + '</table>';
        document.getElementById('admin-matches').innerHTML = '<h3>⚽ المباريات</h3><table><tr><th>المباراة</th><th>البداية</th><th>النتيجة</th><th></th></tr>' +
            db.matches.map(m => `<tr><td>${m.home} ضد ${m.away}</td><td>${m.kickoff}</td><td><input style="width:50px" type="number" value="${m.homeScore ?? ''}" onchange="setResult('${m.id}', this.value, this.parentElement.parentElement.querySelectorAll('input')[1].value)"> - <input style="width:50px" type="number" value="${m.awayScore ?? ''}" onchange="setResult('${m.id}', this.parentElement.parentElement.querySelectorAll('input')[0].value, this.value)"></td><td><button class="btn btn-danger btn-small" onclick="delMatch('${m.id}')">حذف</button></td></tr>`).join('') + '</table>';
    }
}

// Init
if(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('greeting').textContent = '👋 '+user.name;
    render();
}
</script>

</body>
</html>
